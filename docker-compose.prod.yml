  # ── Kafka - KRaft (2C / 2GB / 20GB) ───────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: bridge-bank-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      CLUSTER_ID: bridge-bank-kafka-cluster-01
      KAFKA_HEAP_OPTS: "-Xmx1g -Xms1g"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis (1C / 1GB / 10GB) ────────────────────────────────
  redis:
    image: redis:7
    container_name: bridge-bank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Core Server (2C / 2GB / 20GB) ─────────────────────────
  core-server:
    image: eclipse-temurin:21-jre
    container_name: bridge-bank-core-server
    ports:
      - "8080:8080"
    volumes:
      - ./core-server/build/libs:/app
    working_dir: /app
    command: ["java", "-Xms512m", "-Xmx1g", "-jar", "core-server-0.0.1-SNAPSHOT.jar"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bridge_bank_db
      DB_USERNAME: admin
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reserve Once Transfer Worker (2C / 2GB / 20GB) ────────
  reserve-once-worker:
    image: eclipse-temurin:21-jre
    container_name: bridge-bank-once-worker
    ports:
      - "8081:8081"
    volumes:
      - ./reserve-once-transfer-worker/build/libs:/app
    working_dir: /app
    command: ["java", "-Xms512m", "-Xmx1g", "-jar", "reserve-once-transfer-worker-0.0.1-SNAPSHOT.jar"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bridge_bank_db
      DB_USERNAME: admin
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reserve Repeat Transfer Worker (2C / 2GB / 20GB) ──────
  reserve-repeat-worker:
    image: eclipse-temurin:21-jre
    container_name: bridge-bank-repeat-worker
    ports:
      - "8082:8082"
    volumes:
      - ./reserve-repeat-transfer-worker/build/libs:/app
    working_dir: /app
    command: ["java", "-Xms512m", "-Xmx1g", "-jar", "reserve-repeat-transfer-worker-0.0.1-SNAPSHOT.jar"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bridge_bank_db
      DB_USERNAME: admin
      DB_PASSWORD: 1234
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Kafka UI (optional, 모니터링용) ────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bridge-bank-kafka-ui
    ports:
      - "8989:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: bridge-bank
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  db-data:
  kafka-data:
  redis-data:
