# ============================================================
# Bridge Bank Server - Production Docker Compose
# ============================================================
# 최소 스펙 배포 구성 (6 서비스)
#
# 사전 준비:
#   ./gradlew :core-server:bootJar
#   ./gradlew :reserve-once-transfer-worker:bootJar
#   ./gradlew :reserve-repeat-transfer-worker:bootJar
#
# 실행:
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

